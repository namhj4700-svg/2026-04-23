<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>습관 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>습관 관리</h1>
      <p class="today" id="today-label"></p>
    </header>

    <form class="add-form" id="add-form">
      <input
        type="text"
        id="habit-input"
        placeholder="새 습관을 입력하세요"
        autocomplete="off"
        maxlength="40"
      />
      <button type="submit">추가</button>
    </form>

    <ul class="habit-list" id="habit-list"></ul>

    <p class="empty-msg" id="empty-msg">아직 등록된 습관이 없습니다.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
